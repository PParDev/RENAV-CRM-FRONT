     {from:'lead',text:'Alrededor de 500 mil, tengo preaprobación bancaria.',time:'12 mar, 10:22 am'},
     {from:'agent',text:'Excelente, con eso tienes muy buenas opciones en Nayarit Norte. Te mando catálogo hoy.',time:'12 mar, 11:00 am'},
     {from:'lead',text:'Perfecto, gracias. ¿Tienen algo con jardín y doble estacionamiento?',time:'13 mar, 9:15 am'},
     {from:'agent',text:'Sí tenemos 3 opciones que cumplen eso. ¿Puedes el viernes para una visita?',time:'14 mar, 10:30 am'}],
};

const SUGGESTS={
  1:['¿Confirmamos el jueves?','Te envío el catálogo','¿Cuántas recámaras buscas?'],
  7:['Confirmar visita viernes','Enviar catálogo actualizado','¿Necesitas apoyo de crédito?'],
};

let filtered=[...LEADS];
let activeId=null;
let kpiF='todos';

function estatBadge(e){const m={Nuevo:'bn','En proceso':'bp',Calificado:'bq',Descartado:'bd'};return`<span class="badge ${m[e]||'bn'}">${e}</span>`;}
function prioBadge(p){const m={Urgente:'bu',Alta:'ba',Media:'bm',Baja:'bb'};return`<span class="badge ${m[p]||'bm'}">${p}</span>`;}
function scoreBar(s){const c=s>=70?'sg':s>=40?'sam':'sr';return`<div class="sb"><div class="st"><div class="sf ${c}" style="width:${s}%"></div></div><span class="sv">${s}</span></div>`;}
function lastC(d){if(d===0)return`<span class="lc-ok">Hoy</span>`;if(d<=2)return`<span class="lc-ok">Hace ${d}d</span>`;if(d<=7)return`<span class="lc-warn">Hace ${d}d</span>`;return`<span class="lc-over">Hace ${d}d</span>`;}

function renderTable(){
  const tb=document.getElementById('tb');
  tb.innerHTML=filtered.map(l=>`
    <tr onclick="openLead(${l.id})" id="row${l.id}" class="${activeId===l.id?'active-row':''}">
      <td class="col-n"><input type="checkbox" onclick="e=>e.stopPropagation()"></td>
      <td class="col-lead"><div class="lc"><div class="av" style="background:${l.color};color:${l.tc}">${l.init}</div><div><div class="ln">${l.nombre}</div><div class="le">${l.email}</div></div></div></td>
      <td class="col-sc">${scoreBar(l.score)}</td>
      <td class="col-est">${estatBadge(l.estado)}</td>
      <td class="col-pri">${prioBadge(l.prioridad)}</td>
      <td class="col-ult">${lastC(l.dias)}</td>
    </tr>`).join('');
}

function filterT(){
  const q=document.getElementById('srch').value.toLowerCase();
  const fE=document.getElementById('fE').value;
  const fP=document.getElementById('fP').value;
  filtered=LEADS.filter(l=>{
    const mQ=!q||l.nombre.toLowerCase().includes(q)||l.email.toLowerCase().includes(q);
    const mE=!fE||l.estado===fE;
    const mP=!fP||l.prioridad===fP;
    const mK=kpiF==='todos'||(kpiF==='urgente'&&l.prioridad==='Urgente')||l.estado===kpiF;
    return mQ&&mE&&mP&&mK;
  });
  renderTable();
}

function kpiFilter(type,idx){
  kpiF=type;
  document.querySelectorAll('.kpi').forEach((k,i)=>{k.classList.toggle('sel',i===idx);});
  filterT();
}

function openLead(id){
  activeId=id;
  const l=LEADS.find(x=>x.id===id);
  document.getElementById('tablePanel').classList.add('narrow');
  const dp=document.getElementById('detailPanel');
  dp.classList.add('open');
  document.getElementById('dpName').textContent=l.nombre;
  document.getElementById('dpSub').textContent=l.email+' · '+l.estado;
  document.getElementById('unreadDot').style.display=CHATS[id]?'inline-block':'none';
  renderHero(l);
  renderQA(l);
  renderChat(l);
  renderInfo(l);
  renderActividad(l);
  renderScore(l);
  renderTable();
}

function renderHero(l){
  document.getElementById('dpHero').innerHTML=`
    <div class="hero-row">
      <div class="av-lg" style="background:${l.color};color:${l.tc}">${l.init}</div>
      <div style="flex:1;min-width:0">
        <div class="hero-name">${l.nombre}</div>
        <div class="hero-sub">${l.email}</div>
        <div class="hero-badges">${estatBadge(l.estado)}${prioBadge(l.prioridad)}<span class="badge bq">Score ${l.score}</span></div>
      </div>
      <div class="hero-val"><div class="hero-val-l">Valor est.</div><div class="hero-val-n">${l.valor}</div></div>
    </div>`;
}

function renderQA(l){
  document.getElementById('dpQA').innerHTML=`
    <button class="qa qa-p">✉ Correo</button>
    <button class="qa">☏ Llamar</button>
    <button class="qa">◷ Agendar</button>
    <button class="qa">⊞ Propiedades</button>
    <button class="qa" style="margin-left:auto;color:#dc2626;border-color:#dc2626">Descartar</button>`;
}

function renderChat(l){
  const msgs=CHATS[l.id]||[];
  const body=document.getElementById('chatBody');
  if(msgs.length===0){
    body.innerHTML=`<div style="text-align:center;padding:2rem;color:var(--color-text-tertiary);font-size:12px">Sin mensajes aún.<br>Inicia la conversación con ${l.nombre}.</div>`;
  }else{
    body.innerHTML=msgs.map(m=>`
      <div class="msg ${m.from==='agent'?'agent':'lead'}">
        <div class="msg-bubble">${m.text}</div>
        <div class="msg-meta">${m.from==='agent'?'Tú':'Lead'} · ${m.time}</div>
      </div>`).join('');
    setTimeout(()=>{body.scrollTop=body.scrollHeight;},50);
  }
  const sg=document.getElementById('chatSuggest');
  const sugs=SUGGESTS[l.id]||[];
  sg.innerHTML=sugs.map(s=>`<button class="ca" onclick="useSuggest('${s}')">${s}</button>`).join('');
}

function renderInfo(l){
  const stages=['Nuevo','Contactado','En proceso','Calificado','Cierre'];
  const si=stages.indexOf(l.estado==='Calificado'?'Calificado':l.estado==='En proceso'?'En proceso':l.estado==='Nuevo'?'Contactado':'Nuevo');
  const pipeHtml=`<div class="pipeline-track">`+stages.map((s,i)=>`
    <div class="ps ${i<si?'done':i===si?'cur':''}">
      <div class="ps-line"></div><div class="ps-dot"></div><div class="ps-lbl">${s}</div>
    </div>`).join('')+`</div>`;
  document.getElementById('infoBody').innerHTML=`
    <div class="info-section">
      <div class="info-sec-title">Pipeline</div>
      ${pipeHtml}
    </div>
    <div class="info-section">
      <div class="info-sec-title">Datos de contacto</div>
      <div class="info-row"><span class="ir-l">Email</span><span class="ir-v" style="color:var(--color-text-info)">${l.email}</span></div>
      <div class="info-row"><span class="ir-l">Presupuesto</span><span class="ir-v">${l.presupuesto}</span></div>
      <div class="info-row"><span class="ir-l">Zona de interés</span><span class="ir-v">${l.zona}</span></div>
      <div class="info-row"><span class="ir-l">Tipo de propiedad</span><span class="ir-v">${l.tipo}</span></div>
      <div class="info-row"><span class="ir-l">Plazo de compra</span><span class="ir-v">${l.plazo}</span></div>
      <div class="info-row"><span class="ir-l">Origen</span><span class="ir-v">${l.origen}</span></div>
    </div>
    <div class="info-section">
      <div class="mini-grid">
        <div class="mini-c"><div class="mini-l">Días en pipeline</div><div class="mini-v">${l.dias===0?1:l.dias+1}</div></div>
        <div class="mini-c"><div class="mini-l">Último contacto</div><div class="mini-v" style="font-size:13px;color:${l.dias<=2?'#16a34a':l.dias<=7?'#d97706':'#dc2626'}">${l.dias===0?'Hoy':'Hace '+l.dias+'d'}</div></div>
        <div class="mini-c"><div class="mini-l">Valor estimado</div><div class="mini-v" style="font-size:13px;color:#166534">${l.valor}</div></div>
        <div class="mini-c"><div class="mini-l">Score</div><div class="mini-v">${l.score}</div></div>
      </div>
    </div>`;
}

function renderActividad(l){
  const acts=[
    {dot:'☏',bg:'#dcfce7',title:'Llamada realizada · 12 min',desc:'Cliente confirmó interés. Solicita ver opciones esta semana.',time:'Hoy, 10:15 am'},
    {dot:'✉',bg:'#e0f2fe',title:'Correo enviado',desc:'Bienvenida + catálogo de propiedades en '+l.zona+'. Abierto 3 veces.',time:'Ayer, 3:40 pm'},
    {dot:'✎',bg:'#fef9c3',title:'Nota interna',desc:'Lead llegó por campaña Meta Ads. Alta intención. Priorizar.',time:'13 mar, 9:00 am'},
    {dot:'★',bg:'#f3f4f6',title:'Lead creado',desc:'Formulario web — '+l.origen,time:'12 mar, 8:22 am'},
  ];
  document.getElementById('actBody').innerHTML=`
    <div style="margin-bottom:10px">
      ${acts.map(a=>`<div class="tl-item">
        <div class="tl-dot" style="background:${a.bg}">${a.dot}</div>
        <div style="flex:1;min-width:0">
          <div class="tl-title">${a.title}</div>
          <div class="tl-desc">${a.desc}</div>
          <div class="tl-time">${a.time}</div>
        </div>
      </div>`).join('')}
    </div>
    <div>
      <textarea id="newAct" style="width:100%;padding:8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:12px;font-family:var(--font-sans);resize:none;background:var(--color-background-primary);color:var(--color-text-primary)" rows="2" placeholder="Agregar nota o actividad..."></textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:6px"><button class="btn btn-dark" style="font-size:11px;padding:5px 10px">Guardar</button></div>
    </div>`;
}

function renderScore(l){
  const factors=[
    {label:'Presupuesto declarado',val:Math.round(l.score*1.05>100?100:l.score*1.05),c:'sg'},
    {label:'Tiempo de respuesta',val:Math.round(l.score*0.98),c:'sg'},
    {label:'Plazo de compra',val:Math.round(l.score*0.82),c:'sam'},
    {label:'Engagement correos',val:Math.round(l.score*0.93),c:'sg'},
    {label:'Fuente del lead',val:Math.round(l.score*0.96),c:'sg'},
  ];
  const circleColor=l.score>=70?'#dcfce7':l.score>=40?'#fef3c7':'#fee2e2';
  const circleText=l.score>=70?'#166534':l.score>=40?'#92400e':'#991b1b';
  const circleBorder=l.score>=70?'#16a34a':l.score>=40?'#d97706':'#dc2626';
  const label=l.score>=80?'Lead caliente':l.score>=60?'Lead templado':'Lead frío';
  document.getElementById('scoreBody').innerHTML=`
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
      <div style="width:52px;height:52px;border-radius:50%;background:${circleColor};border:2px solid ${circleBorder};display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;color:${circleText};flex-shrink:0">${l.score}</div>
      <div><div style="font-size:13px;font-weight:500">${label}</div><div style="font-size:11px;color:var(--color-text-secondary)">Top ${Math.round((100-l.score)/2+3)}% de todos los leads</div></div>
    </div>
    ${factors.map(f=>`<div class="score-row">
      <span class="sc-lbl">${f.label}</span>
      <div class="sc-bar"><div class="sc-fill ${f.c}" style="width:${f.val}%"></div></div>
      <span class="sc-val">${f.val}</span>
    </div>`).join('')}`;
}

function showTab(tab,el){
  document.querySelectorAll('.dp-tab').forEach(t=>t.classList.remove('act'));
  el.classList.add('act');
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('visible'));
  document.getElementById('tab-'+tab).classList.add('visible');
  if(tab==='chat'){
    const body=document.getElementById('chatBody');
    setTimeout(()=>{body.scrollTop=body.scrollHeight;},50);
  }
}

function useSuggest(txt){document.getElementById('chatIn').value=txt;}

function sendMsg(){
  const inp=document.getElementById('chatIn');
  const txt=inp.value.trim();
  if(!txt||!activeId)return;
  if(!CHATS[activeId])CHATS[activeId]=[];
  CHATS[activeId].push({from:'agent',text:txt,time:'Ahora'});
  inp.value='';
  renderChat(LEADS.find(x=>x.id===activeId));
}

function chatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}

function closePanel(){
  activeId=null;
  document.getElementById('tablePanel').classList.remove('narrow');
  document.getElementById('detailPanel').classList.remove('open');
  renderTable();
}

renderTable();
</script>
